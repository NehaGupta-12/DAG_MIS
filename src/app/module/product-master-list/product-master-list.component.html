<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="card">

          <!-- Header -->
          <div class="materialTableHeader">
            <div class="left">
              <ul class="header-buttons-left ms-0">
                <li class="tbl-title">
                  <h2 class="fs-4">Product Master</h2>
                </li>
                <li class="tbl-search-box">
                  <label for="search-input">
                    <i class="material-icons search-icon">search</i>
                  </label>
                  <input
                    id="search-input"
                    placeholder="Search"
                    type="text"
                    (keyup)="applyFilter($event)"
                    class="browser-default search-field"
                  />
                </li>
              </ul>
            </div>
            <div class="right">
              <div class="right-side-btn tbl-header-btn col-green btn-large-icon">
                <span [matTooltip]="!authService.hasPermission('Product Master','create') ? 'No permission' : 'Add Product'" matTooltipPosition="above">

                <button mat-icon-button  class="tbl-header-btn col-green" (click)="navigateToAddProductMaster()" [disabled]="!authService.hasPermission('Product Master','create')">
                  <mat-icon>add_circle_outline</mat-icon>
                </button>
                </span>
              </div>
            </div>
          </div>

          <!-- Body -->
          <div class="body overflow-auto">
            <div class="responsive_table">
              <table mat-table [dataSource]="dataSource" matSort class="mat-cell advance-table">

                <!-- ID -->
                <ng-container matColumnDef="id">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Sr.No.</th>
                  <td mat-cell *matCellDef="let row; let i = index">
                    {{ i + 1 + (paginator.pageIndex * paginator.pageSize) }}
                  </td>
                </ng-container>

                <!-- First Name -->
                <ng-container matColumnDef="sku">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Sku</th>
                  <td mat-cell *matCellDef="let row">{{ row.id }}</td>
                </ng-container>

                <!-- Email -->
                <ng-container matColumnDef="name">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
                  <td mat-cell *matCellDef="let row">{{ row.name }}</td>
                </ng-container>

                <!-- Gender -->
                <ng-container matColumnDef="model">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Model</th>
                  <td mat-cell *matCellDef="let row">{{ row.model }}</td>
                </ng-container>

                <!-- Birth Date -->
                <ng-container matColumnDef="brand">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Brand</th>
                  <td mat-cell *matCellDef="let row">{{ row.brand }}</td>
                </ng-container>

                <!-- Mobile -->
                <ng-container matColumnDef="category">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Category</th>
                  <td mat-cell *matCellDef="let row">{{ row.category }}</td>
                </ng-container>

<!--                <ng-container matColumnDef="subCategory">-->
<!--                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Sub Category</th>-->
<!--                  <td mat-cell *matCellDef="let row">{{ row.subCategory }}</td>-->
<!--                </ng-container>-->

                <!-- Address -->
                <ng-container matColumnDef="varient">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Varient</th>
                  <td mat-cell *matCellDef="let row">{{ row.varient }}</td>
                </ng-container>

                <!-- Address -->
                <ng-container matColumnDef="engineCc">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Engine CC</th>
                  <td mat-cell *matCellDef="let row">{{ row.engineCc }}</td>
                </ng-container>

                <!-- Address -->
                <ng-container matColumnDef="unit">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Unit</th>
                  <td mat-cell *matCellDef="let row">{{ row.unit }}</td>
                </ng-container>

                <!-- Action -->
                <!-- Action -->
                <ng-container matColumnDef="action">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Action</th>
                  <td mat-cell *matCellDef="let row">
                    <span [matTooltip]="!authService.hasPermission('Product Master','edit') ? 'No permission' : 'Edit Product'" matTooltipPosition="above">

                    <button mat-icon-button color="accent" (click)="goToEdit(row)" [disabled]="!authService.hasPermission('Product Master','edit')">
                      <app-feather-icons [icon]="'edit'" [class]="'tbl-fav-edit'"></app-feather-icons>
                    </button>
                    </span>
                    <span [matTooltip]="!authService.hasPermission('Product Master','delete') ? 'No permission' : 'Delete Product'" matTooltipPosition="above">

                    <button mat-icon-button color="accent" (click)="delete(row.id)" [disabled]="!authService.hasPermission('Product Master','delete')">
                      <app-feather-icons [icon]="'trash-2'" [class]="'tbl-fav-delete'"></app-feather-icons>
                    </button>
                    </span>
<!--                    <button mat-icon-button color="accent" (click)="openAssignDialog()">-->
<!--                      <app-feather-icons [icon]="'corner-down-right'" [class]="'tbl-fav-assign'"></app-feather-icons>-->
<!--                    </button>-->
                  </td>
                </ng-container>


                <!-- Table Rows -->
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
              </table>


            </div>

            <!-- Loading spinner -->
            <div *ngIf="isLoading" class="tbl-spinner">
              <mat-progress-spinner color="primary" [diameter]="40" mode="indeterminate">
              </mat-progress-spinner>
            </div>

            <!-- No results -->
            <div class="no-results" *ngIf="!isLoading && dataSource.data.length === 0">
              No results
            </div>

            <!-- Pagination -->
            <mat-paginator
              #paginator
              [length]="dataSource.filteredData.length"
              [pageIndex]="0"
              [pageSize]="10"
              [pageSizeOptions]="[5, 10, 25, 100]">
            </mat-paginator>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
