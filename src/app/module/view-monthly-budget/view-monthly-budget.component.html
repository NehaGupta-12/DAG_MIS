

<div class="container-fluid">
  <div class="row">
    <div class="col-lg-12">
      <div class="card">

        <!-- Header -->
        <div class="materialTableHeader">
          <div class="left">
            <ul class="header-buttons-left ms-0">
              <li class="tbl-title">
                <h2 class="fs-4">Monthly Budget Product</h2>
              </li>
              <li class="tbl-search-box">
                <label for="search-input">
                  <i class="material-icons search-icon">search</i>
                </label>
                <input
                  id="search-input"
                  placeholder="Search"
                  type="text"
                  (keyup)="applyFilter($event)"
                  class="browser-default search-field"
                />
              </li>
            </ul>
          </div>
        </div>

        <!-- Body -->
        <div class="body overflow-auto">
          <div class="responsive_table">
            <table mat-table [dataSource]="dataSource" matSort class="mat-cell advance-table">

              <!-- ID -->
              <ng-container matColumnDef="srNo">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Sr. No.</th>
                <td mat-cell *matCellDef="let row; let i = index">
                  {{ i + 1 }}
                </td>
              </ng-container>

              <!-- SKU -->
              <ng-container matColumnDef="sku">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>SKU</th>
                <td mat-cell *matCellDef="let row">{{ row.sku }}</td>
              </ng-container>

              <!-- Name -->
              <ng-container matColumnDef="productName">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
                <td mat-cell *matCellDef="let row">{{ row.productName }}</td>
              </ng-container>



              <!-- Quantity -->
              <ng-container matColumnDef="budgetQuantity">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Budget Quantity</th>
                <td mat-cell *matCellDef="let row">{{ row.budgetQuantity }}</td>
              </ng-container>

              <!-- Action -->
              <ng-container matColumnDef="action">
                <th mat-header-cell *matHeaderCellDef>Action</th>
                <td mat-cell *matCellDef="let row">
                  <span [matTooltip]="!authService.hasPermission('Monthly Budget','edit') ? 'No permission' : 'Edit Role'" matTooltipPosition="above">

                  <button mat-icon-button color="accent" (click)="editProduct(row)" [disabled]="!authService.hasPermission('Monthly Budget','edit')">
                    <app-feather-icons icon="edit" class="tbl-fav-edit"></app-feather-icons>
                  </button>
                  </span>
                  <span [matTooltip]="!authService.hasPermission('Monthly Budget','delete') ? 'No permission' : 'Delete Role'" matTooltipPosition="above">

                  <button mat-icon-button color="accent" (click)="deleteBudget(row)" [disabled]="!authService.hasPermission('Monthly Budget','delete')">
                    <app-feather-icons [icon]="'trash-2'" [class]="'tbl-fav-delete'"></app-feather-icons>
                  </button>
                  </span>
                </td>
              </ng-container>




              <!-- Table Rows -->
              <tr mat-header-row *matHeaderRowDef="getDisplayedColumns()"></tr>
              <tr mat-row *matRowDef="let row; columns: getDisplayedColumns();"></tr>
            </table>


          </div>

          <!-- Loading spinner -->
          <div *ngIf="isLoading" class="tbl-spinner">
            <mat-progress-spinner color="primary" [diameter]="40" mode="indeterminate">
            </mat-progress-spinner>
          </div>

          <!-- No results -->
          <div class="no-results" *ngIf="!isLoading && dataSource.data.length === 0">
            No results
          </div>

          <!-- Pagination -->
          <mat-paginator
            #paginator
            [length]="dataSource.filteredData.length"
            [pageIndex]="0"
            [pageSize]="10"
            [pageSizeOptions]="[5, 10, 25, 100]">
          </mat-paginator>

        </div>
      </div>
    </div>
  </div>
</div>
