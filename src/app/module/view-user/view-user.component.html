<section class="content d-flex justify-content-center align-items-center mt-5">
  <div class="mat-elevation-z4 w-100" style="max-width: 900px;">
    <h5 class="p-1 m-0">User Details</h5>

    <div class="row g-0">
      <!-- Left Column -->
      <div class="col-md-6 p-1">
        <table mat-table [dataSource]="leftData" class="mat-elevation-z1 w-100">
          <ng-container matColumnDef="field">
            <th mat-header-cell *matHeaderCellDef> Field </th>
            <td mat-cell *matCellDef="let element"> {{ element.field }} </td>
          </ng-container>

          <ng-container matColumnDef="value">
            <th mat-header-cell *matHeaderCellDef> Value </th>
            <td mat-cell *matCellDef="let element"> {{ element.value }} </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="['field','value']"></tr>
          <tr mat-row *matRowDef="let row; columns: ['field','value'];"></tr>
        </table>
      </div>

      <!-- Right Column -->
      <div class="col-md-6 p-1">
        <table mat-table [dataSource]="rightData" class="mat-elevation-z1 w-100">

          <ng-container matColumnDef="field">
            <th mat-header-cell *matHeaderCellDef> Field </th>
            <td mat-cell *matCellDef="let element"> {{ element.field }} </td>
          </ng-container>

          <ng-container matColumnDef="value">
            <th mat-header-cell *matHeaderCellDef> Value </th>
            <td mat-cell *matCellDef="let element"> {{ element.value }} </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="['field','value']"></tr>
          <tr mat-row *matRowDef="let row; columns: ['field','value'];"></tr>
        </table>
      </div>
    </div>

    <!-- Role & Outlet Selection -->
    <div class="row p-3">
      <div class="col-md-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Select Role</mat-label>
          <mat-select [(value)]="selectedRole">
            <mat-option *ngFor="let role of _roles$ |async" [value]="role">
              {{ role }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <div class="col-md-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Select Outlet</mat-label>
          <mat-select [(value)]="selectedOutlet" multiple>
            <mat-option *ngFor="let outlet of dealerData" [value]="outlet?.name">
              {{ outlet?.name}}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>

    <!-- Buttons -->
    <div class="p-3 text-center">
      <button mat-raised-button class="btn-space" color="primary" (click)="updateUser()">Update</button>
      <button mat-raised-button color="warn" routerLink="/module/user-list">Back to Users</button>
    </div>
  </div>
</section>
