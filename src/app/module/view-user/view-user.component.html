<section class="content d-flex justify-content-center align-items-center mt-5">
  <div class="mat-elevation-z4 w-100 rounded shadow bg-white" style="max-width: 900px;">

    <!-- Header -->
    <div class="border-bottom px-3 py-2 bg-light">
      <h5 class="m-0 fw-bold  " style="color: black" >User Details</h5>
    </div>

    <!-- User Info Tables -->
    <div class="row g-0 p-3">
      <!-- Left Column -->
      <div class="col-md-6 pe-md-2 mb-3 mb-md-0">
        <table mat-table [dataSource]="leftData" class="mat-elevation-z1 w-100 rounded">

          <!-- Field -->
          <ng-container matColumnDef="field">
            <th mat-header-cell *matHeaderCellDef class="fw-bold"> Field </th>
            <td mat-cell *matCellDef="let element"> {{ element.field }} </td>
          </ng-container>

          <!-- Value -->
          <ng-container matColumnDef="value">
            <th mat-header-cell *matHeaderCellDef class="fw-bold"> Value </th>
            <td mat-cell *matCellDef="let element"> {{ element.value }} </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="['field','value']"></tr>
          <tr mat-row *matRowDef="let row; columns: ['field','value'];"></tr>
        </table>
      </div>

      <!-- Right Column -->
      <div class="col-md-6 ps-md-2">
        <table mat-table [dataSource]="rightData" class="mat-elevation-z1 w-100 rounded">

          <!-- Field -->
          <ng-container matColumnDef="field">
            <th mat-header-cell *matHeaderCellDef class="fw-bold"> Field </th>
            <td mat-cell *matCellDef="let element"> {{ element.field }} </td>
          </ng-container>

          <!-- Value -->
          <ng-container matColumnDef="value">
            <th mat-header-cell *matHeaderCellDef class="fw-bold"> Value </th>
            <td mat-cell *matCellDef="let element"> {{ element.value }} </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="['field','value']"></tr>
          <tr mat-row *matRowDef="let row; columns: ['field','value'];"></tr>
        </table>
      </div>
    </div>

    <!-- Role & Outlet Selection -->
    <div class="row px-3 pb-3">
      <div class="col-md-6 mb-3 mb-md-0">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Select Role</mat-label>
          <mat-select [(value)]="selectedRole">
            <mat-option *ngFor="let role of _roles$ | async" [value]="role">
              {{ role }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <div class="col-md-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Select Outlet</mat-label>
          <mat-select [(value)]="selectedOutlet" multiple>
            <mat-option *ngFor="let outlet of dealerData" [value]="outlet?.name">
              {{ outlet?.name }}
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>

    <!-- Buttons -->
    <div class="px-3 pb-3 text-center">
      <button mat-raised-button color="primary" class="me-2" (click)="updateUser()">
        Update
      </button>
      <button mat-raised-button color="warn" routerLink="/module/user-list">
        Back to Users
      </button>
    </div>
  </div>
</section>
