
<section class="content d-flex justify-content-center align-items-center">
  <div class="content-block w-100" style="max-width: 1000px;">
    <div class="row clearfix justify-content-center">
      <div class="col-xl-12 col-lg-12 col-md-12 col-sm-12">
        <div class="card shadow">
          <div class="header form-header">
            <h2 style="font-size: 23px">Add Daily Sales</h2>
          </div>

          <div class="body">
            <form class="register-form m-4" [formGroup]="dailySalesForm" >

              <!-- Dealer & Vehicle -->
              <div class="row">
                <div class="col-md-6">
                  <!-- Dealer Dropdown -->
                  <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Dealer/Outlet</mat-label>
                    <mat-select formControlName="dealerOutlet" (selectionChange)="onDealerChange($event)" required>
                      <mat-option *ngFor="let dealer of dealerdataSource.data" [value]="dealer.id">
                        {{ dealer.name }}
                      </mat-option>
                    </mat-select>

                    <mat-error *ngIf="dailySalesForm.get('dealerOutlet')?.hasError('required')">
                      Dealer/Outlet is required
                    </mat-error>
                  </mat-form-field>
                </div>

                <div class="col-md-6">
                  <!-- Vehicle Dropdown -->
                  <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Vehicle</mat-label>
                    <mat-select formControlName="vehicle" required>
                      <mat-option *ngFor="let product of vehicledataSource.data" [value]="product.id">
                        {{ product.name }}
                      </mat-option>
                    </mat-select>
                    <mat-error *ngIf="dailySalesForm.get('vehicle')?.hasError('required')">
                      Vehicle is required
                    </mat-error>
                  </mat-form-field>
                </div>
              </div>

              <!-- Auto-populated fields -->
              <div class="row">
                <div class="col-md-4">
                  <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Division</mat-label>
                    <input matInput formControlName="division" readonly>
                  </mat-form-field>
                </div>

                <div class="col-md-4">
                  <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Country</mat-label>
                    <input matInput formControlName="country" readonly>
                  </mat-form-field>
                </div>

                <div class="col-md-4">
                  <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Town</mat-label>
                    <input matInput formControlName="town" readonly>
                  </mat-form-field>
                </div>
              </div>

              <!-- Buttons -->
              <div class="row mt-3">
                <div class="col-12 d-flex justify-content-center gap-3">
<!--                  <button type="submit" [disabled]="!dailySalesForm?.valid" mat-raised-button color="primary">-->
<!--                    {{ isEditMode ? 'Update' : 'Add' }}-->
<!--                  </button>-->
                  <button type="button" mat-raised-button color="accent" (click)="addProduct()">
                    Add Product
                  </button>
                  <button class="btn-back" type="button" mat-raised-button color="warn" (click)=" goBack()">Back</button>
                </div>
              </div>
            </form>
          </div>
        </div>

        <!-- Product Table -->
        <!-- Product Table -->
        <div class="card mt-3">
          <div class="header">
            <h2>Products</h2>
          </div>
          <div class="body">
            <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 w-100">

              <ng-container matColumnDef="sku">
                <th mat-header-cell *matHeaderCellDef> SKU </th>
                <td mat-cell *matCellDef="let row">{{ row.sku }}</td>
              </ng-container>

              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> Name </th>
                <td mat-cell *matCellDef="let row">{{ row.name }}</td>
              </ng-container>

              <ng-container matColumnDef="brand">
                <th mat-header-cell *matHeaderCellDef> Brand </th>
                <td mat-cell *matCellDef="let row">{{ row.brand }}</td>
              </ng-container>

              <ng-container matColumnDef="model">
                <th mat-header-cell *matHeaderCellDef> Model </th>
                <td mat-cell *matCellDef="let row">{{ row.model }}</td>
              </ng-container>

              <ng-container matColumnDef="variant">
                <th mat-header-cell *matHeaderCellDef> Variant </th>
                <td mat-cell *matCellDef="let row">{{ row.variant }}</td>
              </ng-container>

              <ng-container matColumnDef="unit">
                <th mat-header-cell *matHeaderCellDef> Unit </th>
                <td mat-cell *matCellDef="let row">{{ row.unit }}</td>
              </ng-container>

              <!-- ✅ New Quantity Column -->
              <ng-container matColumnDef="quantity">
                <th mat-header-cell *matHeaderCellDef> Quantity </th>
                <td mat-cell *matCellDef="let row">
                  <input type="number"
                         [(ngModel)]="row.quantity"
                         (ngModelChange)="updateQuantity(row, $event)"
                         class="form-control"
                         min="0">
                </td>
              </ng-container>

              <ng-container matColumnDef="action">
                <th mat-header-cell *matHeaderCellDef> Action </th>
                <td mat-cell *matCellDef="let row">
                  <button mat-icon-button (click)="deleteProduct(row)">
                    <mat-icon color="warn">delete</mat-icon>
                  </button>
                </td>
              </ng-container>

              <!-- ✅ Add 'quantity' to displayedColumns -->
              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
          </div>
        </div>
        <!-- ✅ Submit Button -->
        <div class="mt-3 d-flex justify-content-center">
          <button mat-raised-button color="primary" (click)="submitDailySales()">
            Submit Daily Sales
          </button>
        </div>


      </div>
    </div>
  </div>
</section>
