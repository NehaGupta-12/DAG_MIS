<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="card">

          <!-- Header -->
          <div class="materialTableHeader">
            <div class="left">
              <ul class="header-buttons-left ms-0">
                <li class="tbl-title">
                  <h2 class="fs-4">Role</h2>
                </li>
                <li class="tbl-search-box">
                  <label for="search-input">
                    <i class="material-icons search-icon">search</i>
                  </label>
                  <input
                    id="search-input"
                    placeholder="Search"
                    type="text"
                    (keyup)="applyFilter($event)"
                    class="browser-default search-field"
                  />
                </li>
              </ul>
            </div>
            <div class="right">
              <div class="right-side-btn">
                <button mat-icon-button  class="tbl-header-btn col-green" matTooltip="Add" (click)="navigateToAddRole()">
                  <mat-icon>add_circle_outline</mat-icon>
                </button>
              </div>
            </div>
          </div>

          <!-- Body -->
          <div class="body overflow-auto">
            <div class="responsive_table">
              <table mat-table [dataSource]="dataSource" matSort class="mat-cell advance-table">

                <!-- ID -->
                <ng-container matColumnDef="id">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
                  <td mat-cell *matCellDef="let row">{{ row.id }}</td>
                </ng-container>

                <!-- First Name -->
                <ng-container matColumnDef="firstName">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>First Name</th>
                  <td mat-cell *matCellDef="let row">{{ row.firstName }}</td>
                </ng-container>

                <!-- Email -->
                <ng-container matColumnDef="email">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
                  <td mat-cell *matCellDef="let row">{{ row.email }}</td>
                </ng-container>

                <!-- Gender -->
                <ng-container matColumnDef="gender">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Gender</th>
                  <td mat-cell *matCellDef="let row">{{ row.gender }}</td>
                </ng-container>

                <!-- Birth Date -->
                <ng-container matColumnDef="birthDate">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Birth Date</th>
                  <td mat-cell *matCellDef="let row">{{ row.birthDate | date }}</td>
                </ng-container>

                <!-- Mobile -->
                <ng-container matColumnDef="mobile">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Mobile</th>
                  <td mat-cell *matCellDef="let row">{{ row.mobile }}</td>
                </ng-container>

                <!-- Address -->
                <ng-container matColumnDef="address">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Address</th>
                  <td mat-cell *matCellDef="let row">{{ row.address }}</td>
                </ng-container>

                <!-- Country -->
                <ng-container matColumnDef="country">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Country</th>
                  <td mat-cell *matCellDef="let row">{{ row.country }}</td>
                </ng-container>

                <!-- Table Rows -->
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
              </table>


            </div>

            <!-- Loading spinner -->
            <div *ngIf="isLoading" class="tbl-spinner">
              <mat-progress-spinner color="primary" [diameter]="40" mode="indeterminate">
              </mat-progress-spinner>
            </div>

            <!-- No results -->
            <div class="no-results" *ngIf="!isLoading && dataSource.data.length === 0">
              No results
            </div>

            <!-- Pagination -->
            <mat-paginator
              #paginator
              [length]="dataSource.filteredData.length"
              [pageIndex]="0"
              [pageSize]="10"
              [pageSizeOptions]="[5, 10, 25, 100]">
            </mat-paginator>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
