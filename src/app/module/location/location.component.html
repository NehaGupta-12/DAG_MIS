<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="card">

          <!-- Header -->
          <div class="materialTableHeader">
            <div class="left">
              <ul class="header-buttons-left ms-0">
                <li class="tbl-title">
                  <h2 class="fs-4">Location</h2>
                </li>
                <li class="tbl-search-box">
                  <label for="search-input">
                    <i class="material-icons search-icon">search</i>
                  </label>
                  <input
                    id="search-input"
                    placeholder="Search"
                    type="text"
                    #filter
                    class="browser-default search-field"
                  />
                </li>
              </ul>
            </div>
            <div class="right">
              <div class="right-side-btn">
                <button mat-icon-button  class="tbl-header-btn col-green" matTooltip="Add" (click)="openDialog()">
                  <mat-icon>add_circle_outline</mat-icon>
                </button>
              </div>
            </div>
          </div>

          <!-- Body -->
          <div class="body overflow-auto">
            <div class="responsive_table">
              <table mat-table [dataSource]="dataSource" matSort class="mat-cell advance-table">

                <!-- Dynamic Columns -->
                <ng-container *ngFor="let column of columnDefinitions" [matColumnDef]="column.def">
                  <mat-header-cell *matHeaderCellDef mat-sort-header>
                    {{ column.label }}
                  </mat-header-cell>
                  <mat-cell *matCellDef="let row">
                    {{ row[column.def] }}
                  </mat-cell>
                </ng-container>

                <mat-header-row *matHeaderRowDef="getDisplayedColumns()"></mat-header-row>
                <mat-row *matRowDef="let row; columns: getDisplayedColumns();"></mat-row>
              </table>
            </div>

            <!-- Loading spinner -->
            <div *ngIf="isLoading" class="tbl-spinner">
              <mat-progress-spinner color="primary" [diameter]="40" mode="indeterminate">
              </mat-progress-spinner>
            </div>

            <!-- No results -->
            <div class="no-results" *ngIf="!isLoading && dataSource.data.length === 0">
              No results
            </div>

            <!-- Pagination -->
            <mat-paginator
              #paginator
              [length]="dataSource.filteredData.length"
              [pageIndex]="0"
              [pageSize]="10"
              [pageSizeOptions]="[5, 10, 25, 100]">
            </mat-paginator>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
