<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="card">

          <!-- Header -->
          <div class="materialTableHeader">
            <div class="left">
              <ul class="header-buttons-left ms-0">
                <li class="tbl-title">
                  <h2 class="fs-4">Outlet/Dealer List</h2>
                </li>
                <li class="tbl-search-box">
                  <label for="search-input">
                    <i class="material-icons search-icon">search</i>
                  </label>
                  <input
                    id="search-input"
                    placeholder="Search"
                    type="text"
                    (keyup)="applyFilter($event)"
                    class="browser-default search-field"
                  />
                </li>
              </ul>
            </div>
            <div class="right">
              <div class="right-side-btn">
                <button
                  mat-icon-button
                  class="tbl-header-btn col-green"
                  matTooltip="Add"
                  (click)="navigateToAddDealer()">
                  <mat-icon>add_circle_outline</mat-icon>
                </button>
              </div>
            </div>
          </div>

          <!-- Body -->
          <div class="body overflow-auto">
            <div class="responsive_table">
              <table mat-table [dataSource]="dataSource" matSort class="mat-cell advance-table">

                <!-- Serial Number -->
                <ng-container matColumnDef="serial">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Sr.No.</th>
                  <td mat-cell *matCellDef="let row; let i = index">
                    {{ i + 1 }}
                  </td>
                </ng-container>

                <!-- Name -->
                <ng-container matColumnDef="name">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Showroom Name</th>
                  <td mat-cell *matCellDef="let row">{{ row.name }}</td>
                </ng-container>

                <!-- Outlet Type -->
                <ng-container matColumnDef="outletType">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Outlet Type</th>
                  <td mat-cell *matCellDef="let row">{{ row.outletType }}</td>
                </ng-container>

                <!-- Division -->
                <ng-container matColumnDef="division">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Division</th>
                  <td mat-cell *matCellDef="let row">{{ row.division }}</td>
                </ng-container>

                <!-- Country -->
                <ng-container matColumnDef="country">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Country</th>
                  <td mat-cell *matCellDef="let row">{{ row.country }}</td>
                </ng-container>

                <!-- Town -->
                <ng-container matColumnDef="town">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Town</th>
                  <td mat-cell *matCellDef="let row">{{ row.town }}</td>
                </ng-container>

                <!-- Category -->
                <ng-container matColumnDef="category">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Category</th>
                  <td mat-cell *matCellDef="let row">{{ row.category }}</td>
                </ng-container>

<!--                &lt;!&ndash; Location &ndash;&gt;-->
<!--                <ng-container matColumnDef="location">-->
<!--                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Location</th>-->
<!--                  <td mat-cell *matCellDef="let row">{{ row.location }}</td>-->
<!--                </ng-container>-->

                <!-- Action -->
                <ng-container matColumnDef="action">
                  <th mat-header-cell *matHeaderCellDef>Action</th>
                  <td mat-cell *matCellDef="let row">
                    <button mat-icon-button color="accent" (click)="editDealer(row)">
                      <app-feather-icons icon="edit" class="tbl-fav-edit"></app-feather-icons>
                    </button>
                    <button mat-icon-button color="accent" (click)="deleteDealer(row.id)">
                      <app-feather-icons icon="trash-2" class="tbl-fav-delete"></app-feather-icons>
                    </button>
                  </td>
                </ng-container>

                <!-- Table Rows -->
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
              </table>
            </div>

            <!-- Loading spinner -->
            @if (isLoading) {
              <div class="tbl-spinner">
                <mat-progress-spinner color="primary" [diameter]="40" mode="indeterminate"></mat-progress-spinner>
              </div>
            }


            <!-- No results -->
            @if(!isLoading && dataSource.data.length === 0){
            <div class="no-results" >
              No results
            </div>
            }

            <!-- Pagination -->
            <mat-paginator
              #paginator
              [length]="dataSource.filteredData.length"
              [pageIndex]="0"
              [pageSize]="10"
              [pageSizeOptions]="[5, 10, 25, 100]">
            </mat-paginator>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
