<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="card">

          <!-- Header -->
          <div class="materialTableHeader">
            <div class="left">
              <ul class="header-buttons-left ms-0">
                <li class="tbl-title">
                  <h2 class="fs-4">Yearly Budget List</h2>
                </li>
                <li class="tbl-search-box">
                  <label for="search-input">
                    <i class="material-icons search-icon">search</i>
                  </label>
                  <input
                    id="search-input"
                    placeholder="Search"
                    type="text"
                    (keyup)="applyFilter($event)"
                    class="browser-default search-field"
                  />
                </li>
              </ul>
            </div>
            <div class="right">
              <div class="right-side-btn">
                <button mat-icon-button  class="tbl-header-btn col-green" matTooltip="Add" (click)="navigateToAddloadOutletProduct()" [disabled]="!authService.hasPermission('Yearly Budget','create')">
                  <mat-icon>add_circle_outline</mat-icon>
                </button>
              </div>
            </div>
          </div>

          <!-- Body -->
          <div class="body ">
            <div class="responsive_table">
              <table mat-table [dataSource]="dataSource" matSort class="mat-cell advance-table">

                <!-- ID -->
                <ng-container matColumnDef="serial">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Sr.No.</th>
                  <td mat-cell *matCellDef="let row; let i = index">
                    {{ i + 1 }}
                  </td>
                </ng-container>


                <ng-container matColumnDef="country">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Country</th>
                  <td mat-cell *matCellDef="let row">{{ row.country }}</td>
                </ng-container>


                <ng-container matColumnDef="year">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Year</th>
                  <td mat-cell *matCellDef="let row">{{ row.year }}</td>
                </ng-container>


                <!-- Gender -->
                <ng-container matColumnDef="period">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Period</th>
                  <td mat-cell *matCellDef="let row">
                    {{ row.period.start.seconds * 1000 | date:'dd/MM/yyyy' }}
                    -
                    {{ row.period.end.seconds * 1000 | date:'dd/MM/yyyy' }}
                  </td>
                </ng-container>

                <ng-container matColumnDef="budgetQuantity">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Total Budget Quantity</th>
                  <td mat-cell *matCellDef="let row">{{ row.quantity }}</td>
                </ng-container>


                <!-- Action -->
                <ng-container matColumnDef="action">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Action</th>
                  <td mat-cell *matCellDef="let row">
                    <!-- View -->
                    <button mat-icon-button color="primary" (click)="openViewDialog(row)" [disabled]="!authService.hasPermission('Yearly Budget','list')">
                      <mat-icon>visibility</mat-icon>
                    </button>

<!--                    <button mat-icon-button color="accent" (click)="deleteBudget(row)">-->
<!--                      <app-feather-icons [icon]="'trash-2'" [class]="'tbl-fav-delete'"></app-feather-icons>-->
<!--                    </button>-->
                  </td>
                </ng-container>


                <!-- Table Rows -->
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
              </table>


            </div>

            <!-- Loading spinner -->
            <div *ngIf="isLoading" class="tbl-spinner">
              <mat-progress-spinner color="primary" [diameter]="40" mode="indeterminate">
              </mat-progress-spinner>
            </div>

            <!-- No results -->
            <div class="no-results" *ngIf="!isLoading && dataSource.data.length === 0">
              No results
            </div>

            <!-- Pagination -->
            <mat-paginator
              #paginator
              [length]="dataSource.filteredData.length"
              [pageIndex]="0"
              [pageSize]="10"
              [pageSizeOptions]="[5, 10, 25, 100]">
            </mat-paginator>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
