<section class="container mt-4">
  <div class="col-xl-8 col-lg-9 col-md-10 col-sm-12 mx-auto">
    <div class="card shadow-sm border-0">

      <!-- Header -->
      <div class="card-header  d-flex align-items-center">
        <h6 class="mb-0">
          {{ isEditMode ? 'Edit Menu List' : 'Add Menu List' }}
        </h6>
      </div>

      <!-- Body -->
      <div class="card-body">
        <form [formGroup]="menuForm" (ngSubmit)="submitForm()">

          <!-- Menu Name -->
          <div class="mb-3">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Menu Name</mat-label>
              <input
                matInput
                formControlName="menu_name"
                placeholder="e.g., Dashboard"
                (input)="onInputChange($event)"
              />
              <mat-error *ngIf="menuForm.get('menu_name')?.hasError('required')">
                Menu name is required.
              </mat-error>
            </mat-form-field>
          </div>

          <!-- Menu URL -->
          <div class="mb-3">
            <mat-form-field appearance="outline" class="w-100">
              <mat-label>Menu URL</mat-label>
              <input
                matInput
                formControlName="menu_url"
                placeholder="e.g., /dashboard"
              />
              <mat-error *ngIf="menuForm.get('menu_url')?.hasError('required')">
                Menu URL is required.
              </mat-error>
            </mat-form-field>
          </div>

          <!-- Actions -->
          <div class="d-flex justify-content-end gap-2">
            <button
              mat-raised-button
              type="button"
              color="warn"
              (click)="close()"
              [disabled]="isLoading"
            >
              Cancel
            </button>
            <button
              mat-raised-button
              color="primary"
              type="submit"
              [disabled]="!menuForm.valid || isLoading"
            >
              {{ isEditMode ? 'Update' : 'Add' }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
