<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="card">

          <!-- Header -->
          <div class="materialTableHeader">
            <div class="left">
              <ul class="header-buttons-left ms-0">
                <li class="tbl-title">
                  <h2 class="fs-4">Menu List</h2>
                </li>
                <li class="tbl-search-box">
                  <label for="search-input">
                    <i class="material-icons search-icon">search</i>
                  </label>
                  <input
                    id="search-input"
                    placeholder="Search"
                    type="text"
                    (keyup)="applyFilter($event)"
                    class="browser-default search-field"
                  />
                </li>
              </ul>
            </div>
            <div class="right">
              <div class="right-side-btn">
                <button mat-icon-button  class="tbl-header-btn col-green" matTooltip="Add" (click)="navigateToAddMenuList()">
                  <mat-icon>add_circle_outline</mat-icon>
                </button>
              </div>
            </div>
          </div>

          <!-- Body -->
          <div class="body overflow-auto">
            <div class="responsive_table">
              <div class="table-responsive">
                <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

                  <!-- Serial No -->
                  <ng-container matColumnDef="serial">
                    <th mat-header-cell *matHeaderCellDef> Sr.No </th>
                    <td mat-cell *matCellDef="let element"> {{ element.serial }} </td>
                  </ng-container>

                  <!-- Menu Name -->
                  <ng-container matColumnDef="menu_name">
                    <th mat-header-cell *matHeaderCellDef> Menu Name </th>
                    <td mat-cell *matCellDef="let element"> {{ element.menu_name }} </td>
                  </ng-container>

                  <!-- Menu URL -->
                  <ng-container matColumnDef="menu_url">
                    <th mat-header-cell *matHeaderCellDef> Menu URL </th>
                    <td mat-cell *matCellDef="let element"> {{ element.menu_url }} </td>
                  </ng-container>

                  <!-- Created By -->
                  <ng-container matColumnDef="createdBy">
                    <th mat-header-cell *matHeaderCellDef> Created By </th>
                    <td mat-cell *matCellDef="let element"> {{ element.createdBy }} </td>
                  </ng-container>

                  <!-- Created At -->
                  <ng-container matColumnDef="createdAt">
                    <th mat-header-cell *matHeaderCellDef> Created At </th>
                    <td mat-cell *matCellDef="let element"> {{ element.createdAt }} </td>
                  </ng-container>

                  <!-- Actions -->
                  <ng-container matColumnDef="action">
                    <th mat-header-cell *matHeaderCellDef> Action </th>
                    <td mat-cell *matCellDef="let row">
                      <button mat-icon-button color="primary" (click)="editMenuList(row)" matTooltip="Edit">
                        <app-feather-icons icon="edit" class="tbl-fav-edit"></app-feather-icons>

                      </button>
                      <button mat-icon-button color="warn" (click)="deleteMenuList(row)" matTooltip="Delete">
                        <app-feather-icons [icon]="'trash-2'" [class]="'tbl-fav-delete'"></app-feather-icons>
                      </button>
                    </td>
                  </ng-container>

                  <!-- Header & Row Rendering -->
                  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                  <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                </table>
              </div>

            </div>

            <!-- Pagination -->
            <mat-paginator
              #paginator
              [length]="dataSource.filteredData.length"
              [pageIndex]="0"
              [pageSize]="10"
              [pageSizeOptions]="[5, 10, 25, 100]">
            </mat-paginator>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
