<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-lg-12">
        <div class="card">

          <!-- Header -->
          <div class="materialTableHeader">
            <div class="left">
              <ul class="header-buttons-left ms-0">
                <li class="tbl-title">
                  <h2 class="fs-4">Outlet Product List</h2>
                </li>
                <li class="tbl-search-box">
                  <label for="search-input">
                    <i class="material-icons search-icon">search</i>
                  </label>
                  <input
                    id="search-input"
                    placeholder="Search"
                    type="text"
                    (keyup)="applyFilter($event)"
                    class="browser-default search-field"
                  />
                </li>
              </ul>
            </div>
            <div class="right">
              <div class="right-side-btn">
                <span [matTooltip]="!authService.hasPermission('Outlet/Dealer Product List','create') ? 'No permission' : 'Add Role'" matTooltipPosition="above">

                <button mat-icon-button  class="tbl-header-btn col-green"  (click)="navigateToAddloadOutletProduct()" [disabled]="!authService.hasPermission('Outlet/Dealer Product List','create')">
                  <mat-icon>add_circle_outline</mat-icon>
                </button>
                </span>
              </div>
            </div>
          </div>

          <!-- Body -->
          <div class="body overflow-auto">
            <div class="responsive_table">
              <table mat-table [dataSource]="dataSource" matSort class="mat-cell advance-table">

                <!-- ID -->
                <ng-container matColumnDef="serial">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Sr.No.</th>
                  <td mat-cell *matCellDef="let row; let i = index">
                    {{ i + 1 }}
                  </td>
                </ng-container>

                <!-- First Name -->
                <ng-container matColumnDef="name">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
                  <td mat-cell *matCellDef="let row">{{ row.name }}</td>
                </ng-container>

                <ng-container matColumnDef="sku">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Sku</th>
                  <td mat-cell *matCellDef="let row">{{ row.sku }}</td>
                </ng-container>

                <ng-container matColumnDef="variant">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Variant</th>
                  <td mat-cell *matCellDef="let row">{{ row.variant }}</td>
                </ng-container>

                <!-- First Name -->
                <ng-container matColumnDef="outlet">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Outlet/dealer</th>
                  <td mat-cell *matCellDef="let row">{{ row.dealerOutlet }}</td>
                </ng-container>

                <ng-container matColumnDef="openingStock">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Opening Stock</th>
                  <td mat-cell *matCellDef="let row">{{ row.openingStock }}</td>
                </ng-container>


                 Gender
                <ng-container matColumnDef="remark">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Remark</th>
                  <td mat-cell *matCellDef="let row">
                    <div class="remark-container">

                      <!-- Collapsed view -->
                      <div *ngIf="!row.expanded" class="truncate-text">
                        {{ row.remark | slice:0:30 }}
                        <span *ngIf="row.remark?.length > 30" class="dots" (click)="row.expanded = true">
          ...
        </span>
                      </div>

                      <!-- Expanded view -->
                      <div *ngIf="row.expanded" class="rest-text">
                        {{ row.remark }}
                        <span class="dots" (click)="row.expanded = false">
          ...
        </span>
                      </div>

                    </div>
                  </td>
                </ng-container>


                <!--                <ng-container matColumnDef="remark">-->
<!--                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Remark</th>-->
<!--                  <td mat-cell *matCellDef="let row">-->
<!--                    <div class="remark-container" [matTooltip]="row.remark" matTooltipPosition="above">-->
<!--                      {{ row.remark }}-->
<!--                    </div>-->
<!--                  </td>-->
<!--                </ng-container>-->








                <!-- Action -->
                <ng-container matColumnDef="action">
                  <th mat-header-cell *matHeaderCellDef mat-sort-header>Action</th>
                  <td mat-cell *matCellDef="let row">
                    <span [matTooltip]="!authService.hasPermission('Outlet/Dealer Product List','edit') ? 'No permission' : 'Edit Role'" matTooltipPosition="above">
                    <button mat-icon-button color="accent" (click)="editloadOutletProduct(row)" [disabled]="!authService.hasPermission('Outlet/Dealer Product List','edit')">
                      <app-feather-icons [icon]="'edit'" [class]="'tbl-fav-edit'"></app-feather-icons>
                    </button>
                         </span>
                    <span [matTooltip]="!authService.hasPermission('Outlet/Dealer Product List','delete') ? 'No permission' : 'Delete Role'" matTooltipPosition="above">

                    <button mat-icon-button color="accent" (click)="deleteOutletProduct(row)" [disabled]="!authService.hasPermission('Outlet/Dealer Product List','delete')">
                      <app-feather-icons [icon]="'trash-2'" [class]="'tbl-fav-delete'"></app-feather-icons>
                    </button>
                        </span>
                  </td>
                </ng-container>


                <!-- Table Rows -->
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
              </table>


            </div>

            <!-- Loading spinner -->
            <div *ngIf="isLoading" class="tbl-spinner">
              <mat-progress-spinner color="primary" [diameter]="40" mode="indeterminate">
              </mat-progress-spinner>
            </div>

            <!-- No results -->
            <div class="no-results" *ngIf="!isLoading && dataSource.data.length === 0">
              No results
            </div>

            <!-- Pagination -->
            <mat-paginator
              #paginator
              [length]="dataSource.filteredData.length"
              [pageIndex]="0"
              [pageSize]="10"
              [pageSizeOptions]="[5, 10, 25, 100]">
            </mat-paginator>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>
