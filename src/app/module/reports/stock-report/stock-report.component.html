
<section class="content">
  <div class="content-block">
    <div class="row p-3">
      <div class="col-md-12">
        <h4 class="text-center">Stock Report</h4>
      </div>
    </div>

    <div class="card shadow p-4">
      <form [formGroup]="dealerForm" class="row g-3 align-items-center">

        <!-- Country -->
        <div class="col-md-2">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Select Country</mat-label>
            <mat-select formControlName="country" #countrySelect panelClass="custom-select-panel"
                        (openedChange)="onCountrySelectOpened($event)">
              <!-- 🔍 Search Box -->
              <div class="mat-select-search">
                <input matInput placeholder="Search Country"
                       #countrySearchInput
                       (input)="onCountrySearchChange($event)" />
              </div>
              <mat-option *ngFor="let item of filteredOptions.country" [value]="item">
                {{ item }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <!-- Division -->
                <div class="col-md-2">
                  <mat-form-field appearance="outline" class="w-100">
                    <mat-label>Select Division</mat-label>
                    <mat-select formControlName="division" #divisionSelect panelClass="custom-select-panel"
                                (openedChange)="onDivisionSelectOpened($event)">
                      <div class="mat-select-search">
                        <input matInput placeholder="Search Division"
                               #divisionSearchInput
                               (input)="onDivisionSearchChange($event)" />
                      </div>
                      <mat-option *ngFor="let item of filteredOptions.division" [value]="item">
                        {{ item }}
                      </mat-option>
                    </mat-select>
                  </mat-form-field>
                </div>

        <!-- Town -->
        <div class="col-md-2">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Select Town</mat-label>
            <mat-select formControlName="town" #townSelect panelClass="custom-select-panel"
                        (openedChange)="onTownSelectOpened($event)">
              <div class="mat-select-search">
                <input matInput placeholder="Search Town"
                       #townSearchInput
                       (input)="onTownSearchChange($event)" />
              </div>
              <mat-option *ngFor="let item of filteredOptions.town" [value]="item">
                {{ item }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>

        <!-- Showroom Name -->
        <div class="col-md-4">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Select Outlet</mat-label>
            <mat-select formControlName="name" multiple #outletSelect panelClass="custom-select-panel"
                        (openedChange)="onOutletSelectOpened($event)">
              <div class="mat-select-search">
                <input matInput placeholder="Search Outlet"
                       #outletSearchInput
                       (input)="onOutletSearchChange($event)" />
              </div>
              <mat-option *ngFor="let dealer of filteredOptions.name" [value]="dealer">
                {{ dealer }}
              </mat-option>
            </mat-select>
          </mat-form-field>
        </div>


        <!-- Product -->
        <!--        <div class="col-md-4">-->

<!--          </mat-form-field>-->

        <!-- Action Buttons -->
        <div class="col-md-2 d-flex justify-content-end gap-2 mt-2">
          <button mat-mini-fab color="primary" matTooltip="Search" (click)="onSubmit()" [disabled]="dealerForm.invalid">
            <mat-icon>search</mat-icon>
          </button>
          <button mat-mini-fab color="warn" matTooltip="Clear" (click)="onCancel()">
            <mat-icon>clear</mat-icon>
          </button>
          <button mat-mini-fab style="background-color:#28a745; color:#fff;" matTooltip="Export to Excel" (click)="exportToExcel()" [disabled]="!authService.hasPermission('Stock Report','export')">
            <mat-icon>download</mat-icon>
          </button>
        </div>
      </form>

      <!-- Table -->
      <hr />
<!--      <div class="d-flex justify-content-between align-items-center my-3">-->
<!--        <h5>{{ reportTitle }}</h5>-->
<!--        <h5>{{ reportDate }}</h5>-->
<!--      </div>-->

      <div style="overflow-x: auto; width: 100%">
        <table mat-table [dataSource]="finalTableData" class="mat-elevation-z1 w-100 custom-bordered" style="min-width: max-content;">

          <!-- Country -->
          <ng-container matColumnDef="country">
            <th mat-header-cell *matHeaderCellDef> Country </th>
            <td mat-cell *matCellDef="let row"> {{ row.country }} </td>
          </ng-container>

          <!-- Division -->
          <ng-container matColumnDef="division">
            <th mat-header-cell *matHeaderCellDef> Division </th>
            <td mat-cell *matCellDef="let row"> {{ row.division }} </td>
          </ng-container>

          <!-- Town -->
          <ng-container matColumnDef="town">
            <th mat-header-cell *matHeaderCellDef> Town </th>
            <td mat-cell *matCellDef="let row"> {{ row.town }} </td>
          </ng-container>

          <!-- Outlet Name -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Outlet </th>
            <td mat-cell *matCellDef="let row"> {{ row.name }} </td>
          </ng-container>

          <!-- Dynamic Product Columns -->
          <ng-container *ngFor="let col of productHeaders" [matColumnDef]="col">
            <th mat-header-cell *matHeaderCellDef> {{ col }} </th>
            <td mat-cell *matCellDef="let row"> {{ row[col] || 0 }} </td>
          </ng-container>

          <!-- Total Column -->
          <ng-container matColumnDef="total">
            <th mat-header-cell *matHeaderCellDef> Total </th>
            <td mat-cell *matCellDef="let row"> {{ row.total }} </td>
          </ng-container>

          <!-- Table rows -->
          <tr mat-header-row *matHeaderRowDef="tableColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: tableColumns;"></tr>
        </table>
      </div>


    </div>
  </div>
</section>
