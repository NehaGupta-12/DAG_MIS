<section class="content d-flex justify-content-center align-items-center">
  <div class="content-block w-100">
    <div class="container py-4">

      <!-- Select Type Row -->
      <div class="row mb-3">
        <div class="col-md-6 mb-2">
          <label for="selectType" class="form-label fw-bold">Select Division</label>
          <select class="form-select" id="selectType" [(ngModel)]="selectedOption" (change)="onTypeChange()">
            <option value="" selected disabled>Select Division...</option>
            <option *ngFor="let type of availableTypes" [value]="type">{{ type }}</option>
          </select>
        </div>
        <div class="col-md-6 d-flex align-items-end mb-2">
          <button class="btn btn-warning w-40" (click)="openConfirmBeforeAddType()">Add Type</button>
        </div>
      </div>

      <!-- Inline Add Type Form -->
      <div *ngIf="showAddTypeForm" class="card mb-4">
        <div class="card-body">
          <h5 class="mb-3">Add Type</h5>
          <form [formGroup]="typeForm" (ngSubmit)="submitType()">
            <input
              formControlName="name"
              class="form-control mb-2"
              placeholder="Enter Name *"
              [ngClass]="{'is-invalid': typeForm.controls['name'].invalid && typeForm.controls['name'].touched}"
            />
            <div *ngIf="typeForm.controls['name'].invalid && typeForm.controls['name'].touched" class="text-danger">
              * It is Required.
            </div>
            <button class="btn btn-primary mt-2" type="submit" [disabled]="typeForm.invalid">
              Submit
            </button>
          </form>
        </div>
      </div>

      <!-- Add Field Row -->
      <div class="row mb-4" *ngIf="showAddFieldRow">
        <div class="col-md-6 mb-2">
          <input type="text" [(ngModel)]="fieldValue" class="form-control" placeholder="Enter Town *">
        </div>
        <div class="col-md-6 d-flex mb-2">
          <button class="btn btn-primary w-40" (click)="confirmAddField()">Add {{ selectedOption }}</button>
        </div>
      </div>

      <!-- Dynamic Tables (per type) -->
      <div *ngFor="let type of availableTypes">
        <div *ngIf="(typeData?.[type]?.length || 0) > 0" class="card mb-3">
          <div class="card-body">
            <h5 class="mb-3">{{ type }} Towns</h5>
            <div class="table-responsive">
              <table class="table table-bordered align-middle">
                <thead>
                <tr>
                  <th>Name</th>
                  <th style="width: 150px;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr *ngFor="let item of typeData[type]; let i = index">
                  <td>{{ item.name }}</td>
                  <td>
                    <button class="btn btn-sm btn-danger" (click)="deleteItem(type, i)">Delete</button>
                  </td>
                </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
