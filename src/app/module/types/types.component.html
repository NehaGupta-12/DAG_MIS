
<section class="content d-flex justify-content-center align-items-start">
  <div class="content-block w-100">
    <div class="container py-2"><!-- reduced py-4 to py-3 -->

      <!-- Category + Add Button -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0">Types / Dropdown</h4>
        <button mat-fab color="primary" (click)="openModal()" class="btn-add">Add</button>
      </div>

      <!-- Modal with Fade Background -->
      <div *ngIf="showModal" class="modal-overlay">
        <div class="modal-box card shadow">
          <div class="card-body">
            <h5 class="mb-3">Add Type</h5>
            <input
              type="text"
              [(ngModel)]="newCategory"
              class="form-control mb-3"
              placeholder="Enter Name *"
            />

            <div class="d-flex justify-content-start">
              <!-- Cancel -->
              <button class="btn btn-secondary me-2" (click)="closeModal()">Cancel</button>

              <!-- Submit -->
              <button class="btn btn-primary"
                      (click)="addCategory(newCategory); newCategory=''; closeModal()">
                Submit
              </button>
            </div>
          </div>
        </div>
      </div>



      <!-- Category Table -->
      <div class="card mb-4">
        <div class="card-body p-3">
          <h5 class="mb-3">Types List</h5>
          <div class="table-responsive table-scroll">
            <table class="table table-bordered align-middle mb-0">
              <thead>
              <tr style="font-size: 16px; font-weight: bold">
                <th>Name</th>
                <th>Actions</th>
              </tr>
              </thead>
              <tbody>
              <tr *ngFor="let cat of categories">
                <td>{{ cat.name }}</td>
                <td>
                  <button mat-icon-button color="accent" (click)="deleteCategory(cat.name)">
                    <app-feather-icons [icon]="'trash-2'" [class]="'tbl-fav-delete'"></app-feather-icons>
                  </button>
                </td>
              </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Dropdown -->
      <div class="row mb-3">
        <div class="col-md-6 mb-2">
          <label class="form-label fw-bold">Select Type</label>
          <select class="form-select" [(ngModel)]="selectedCategory">
            <option [ngValue]="null" abled>Select...</option>
            <option *ngFor="let cat of categories" [ngValue]="cat">{{ cat.name }}</option>
          </select>


        </div>
      </div>

      <!-- Subcategory Add -->

      <div *ngIf="selectedCategory" class="row mb-4">
        <div class="col-md-6 mb-2">
          <input type="text" [(ngModel)]="newField" class="form-control" placeholder="Enter Field *">
        </div>
        <div class="col-md-6 d-flex mb-2">
          <button class="btn btn-primary" (click)="addSubCategory(newField); newField=''">
            Add {{ selectedCategory.name }}
          </button>
        </div>
      </div>

      <!-- Subcategory List -->
      <div class="row mb-3">
        <div class="col-md-6 mb-2">
          <h4 class="fw-bold">Sub Types</h4>
        </div>
      </div>
<!--      <h4 class="fw-bold mt-3 ">Sub Category</h4>-->
      <div *ngIf="selectedCategory" class="card mb-3">
        <div class="card-body">
          <h5 class="mb-3">{{ selectedCategory.name }}</h5>
          <div class="table-responsive">
            <table class="table table-bordered align-middle">
              <thead>
              <tr style="font-size: 16px; font-weight: bold">
                <th>Name</th>
                <th style="width: 150px;">Actions</th>
              </tr>
              </thead>
              <tbody>
              <tr *ngFor="let sub of selectedCategory.subcategories; let i = index">
                <td>{{ sub }}</td>
                <td>
                  <button mat-icon-button color="accent" (click)="deleteSubCategory(sub)">
                    <app-feather-icons [icon]="'trash-2'" [class]="'tbl-fav-delete'"></app-feather-icons>
                  </button>
                </td>
              </tr>

              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
