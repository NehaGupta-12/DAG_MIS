      <!-- Select Type Row -->
      <div class="row mb-3">
        <div class="col-md-6 mb-2">
          <label for="selectType" class="form-label fw-bold">Select Type</label>
          <select class="form-select" id="selectType" (change)="onTypeChange($event)">
            <option value="" selected disabled>Select...</option>
            <option value="Contacts">Contacts</option>
            <option value="Suppliers">Suppliers</option>
            <option value="Clients">Clients</option>
          </select>
        </div>
        <div class="col-md-6 d-flex align-items-end mb-2">
          <button class="btn btn-warning w-40">Add Type</button>
        </div>
      </div>

      <!-- Add Field Row (hidden by default, shown only after dropdown selection) -->
      <div class="row mb-4" *ngIf="showAddFieldRow">
        <div class="col-md-6 mb-2">
          <input type="text" class="form-control" placeholder="Enter Field *">
        </div>
        <div class="col-md-6 d-flex mb-2">
          <button class="btn btn-primary w-40">Add {{ selectedOption }}</button>
        </div>
      </div>



      <!-- Types Table -->
      <div class="card">
        <div class="card-body">
          <h5 class="mb-3">Types</h5>
          <div class="table-responsive">
            <table class="table table-bordered align-middle">
              <thead>
              <tr>
                <th>Name</th>
                <th style="width: 150px;">Actions</th>
              </tr>
              </thead>
              <tbody>
              <tr>
                <td>Supplier</td>
                <td>
                  <button class="btn btn-sm btn-primary">Delete</button>
                </td>
              </tr>
              <tr>
                <td>Dealer</td>
                <td>
                  <button class="btn btn-sm btn-primary">Delete</button>
                </td>
              </tr>
              <tr>
                <td>Contractor</td>
                <td>
                  <button class="btn btn-sm btn-primary">Delete</button>
                </td>
              </tr>
              <tr>
                <td>Site Engineer (Client)</td>
                <td>
                  <button class="btn btn-sm btn-primary">Delete</button>
                </td>
              </tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination Footer -->
          <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap">
            <div>
              <label class="me-2">Items per page:</label>
              <select class="form-select form-select-sm d-inline-block w-auto">
                <option>10</option>
                <option>25</option>
                <option>50</option>
              </select>
            </div>
            <div class="d-flex align-items-center gap-3">
              <span>1 – 4 of 4</span>
              <div>
                <button class="btn btn-sm btn-light">&lt;</button>
                <button class="btn btn-sm btn-light">&gt;</button>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</section>
