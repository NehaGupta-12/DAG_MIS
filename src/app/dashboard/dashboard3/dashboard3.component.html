<section class="content">
  <div class="container-fluid">

    <div class="row clearfix">
      <!-- Task Info -->
      <div class="col-xs-12 col-sm-12 col-md-8 col-lg-8">
        <mat-card>
          <mat-card-header class="header-style">
            <mat-card-title>Projects Details</mat-card-title>
            <a mat-button color="primary" href="#" (click)="$event.preventDefault();">View All</a>
          </mat-card-header>
          <mat-card-content>
            <ng-scrollbar style="height: 400px" visibility="hover">
              <app-table-card [dataSource]="projectData"
                [columnDefinitions]="projectColumnDefinitions"></app-table-card>
            </ng-scrollbar>
          </mat-card-content>
        </mat-card>
      </div>
      <!-- #END# Task Info -->
      <!-- Browser Usage -->
      <div class="col-xl-4 col-lg-4 col-md-12 col-sm-12">
        <mat-card>
          <mat-card-header class="header-style">
            <mat-card-title>Projects Details</mat-card-title>
            <a mat-button color="primary" href="#" (click)="$event.preventDefault();">View All</a>
          </mat-card-header>
          <mat-card-content>
            <ng-scrollbar style="height: 400px" visibility="hover">
              <apx-chart [series]="pieChartOptions.series2!" [chart]="pieChartOptions.chart!"
                [labels]="pieChartOptions.labels!" [responsive]="pieChartOptions.responsive!"
                [dataLabels]="pieChartOptions.dataLabels!" [legend]="pieChartOptions.legend!" class="apex-pie-center">
              </apx-chart>
              <div class="table-responsive m-t-15">
                <table class="table align-items-center">
                  <tbody>
                    <tr>
                      <td><i class="fa fa-circle col-blue msr-2"></i>Project 1</td>
                      <td>44</td>
                      <td class="col-green">+12%</td>
                    </tr>
                    <tr>
                      <td><i class="fa fa-circle col-green msr-2"></i>Project 2</td>
                      <td>55</td>
                      <td class="col-orange">-12%</td>
                    </tr>
                    <tr>
                      <td><i class="fa fa-circle col-orange msr-2"></i>Project 3</td>
                      <td>13</td>
                      <td class="col-green">+3%</td>
                    </tr>
                    <tr>
                      <td><i class="fa fa-circle col-red msr-2"></i>Project 3</td>
                      <td>43</td>
                      <td class="col-green">+3%</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </ng-scrollbar>
          </mat-card-content>
        </mat-card>
      </div>
      <!-- #END# Browser Usage -->
    </div>
    <div class="row clearfix">
      <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
        <mat-card>
          <mat-card-header class="header-style">
            <mat-card-title>Project Completed Chart</mat-card-title>
            <button mat-icon-button [matMenuTriggerFor]="menu" class="header-dropdown">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item>
                <mat-icon>add_circle_outline</mat-icon>
                <span>Add</span>
              </button>
              <button mat-menu-item disabled>
                <mat-icon>delete_outline</mat-icon>
                <span>Delete</span>
              </button>
              <button mat-menu-item>
                <mat-icon>refresh</mat-icon>
                <span>Refresh</span>
              </button>
            </mat-menu>
          </mat-card-header>
          <mat-card-content>
            <div class="row">
              <div class="col-lg-9 col-md-8 col-sm-12 col-xs-12">
                <div id="chart">
                  <apx-chart [series]="chartOptions.series!" [chart]="chartOptions.chart!" [xaxis]="chartOptions.xaxis!"
                    [stroke]="chartOptions.stroke!" [tooltip]="chartOptions.tooltip!"
                    [dataLabels]="chartOptions.dataLabels!" [legend]="chartOptions.legend!"
                    [markers]="chartOptions.markers!" [grid]="chartOptions.grid!" [yaxis]="chartOptions.yaxis!"
                    [title]="chartOptions.title!"></apx-chart>
                </div>
              </div>

              <div class="col-lg-3 col-md-4 col-sm-12 col-xs-12">
                <h6>Worldwide Clients</h6>
                <br>
                <div class="progress-list m-b-10">
                  <div class="details">
                    <div class="title">USA</div>
                  </div>
                  <div class="status">
                    <span>40</span>%
                  </div>
                  <div class="progress-xs not-rounded progress">
                    <div class="progress-bar progress-bar-warning width-per-40" role="progressbar" aria-valuenow="40"
                      aria-valuemin="0" aria-valuemax="100">
                      <span class="sr-only">40%</span>
                    </div>
                  </div>
                </div>
                <div class="progress-list m-b-10">
                  <div class="details">
                    <div class="title">Canada</div>
                  </div>
                  <div class="status">
                    <span>38</span>%
                  </div>
                  <div class="progress-xs not-rounded progress">
                    <div class="progress-bar progress-bar-success width-per-31" role="progressbar" aria-valuenow="38"
                      aria-valuemin="0" aria-valuemax="100">
                      <span class="sr-only">38%</span>
                    </div>
                  </div>
                </div>
                <div class="progress-list m-b-10">
                  <div class="details">
                    <div class="title">Asia</div>
                  </div>
                  <div class="status">
                    <span>12</span>%
                  </div>
                  <div class="progress-xs not-rounded progress">
                    <div class="progress-bar progress-bar-lightred width-per-22" role="progressbar" aria-valuenow="12"
                      aria-valuemin="0" aria-valuemax="100">
                      <span class="sr-only">12%</span>
                    </div>
                  </div>
                </div>
                <div class="progress-list m-b-10">
                  <div class="details">
                    <div class="title">Germany</div>
                  </div>
                  <div class="status">
                    <span>49</span>%
                  </div>
                  <div class="progress-xs not-rounded progress">
                    <div class="progress-bar progress-bar-danger width-per-49" role="progressbar" aria-valuenow="49"
                      aria-valuemin="0" aria-valuemax="100">
                      <span class="sr-only">49%</span>
                    </div>
                  </div>
                </div>
                <div class="progress-list m-b-10">
                  <div class="details">
                    <div class="title">France</div>
                  </div>
                  <div class="status">
                    <span>65</span>%
                  </div>
                  <div class="progress-xs not-rounded progress">
                    <div class="progress-bar progress-bar-blue width-per-65" role="progressbar" aria-valuenow="65"
                      aria-valuemin="0" aria-valuemax="100">
                      <span class="sr-only">65%</span>
                    </div>
                  </div>
                </div>
                <div class="progress-list m-b-10">
                  <div class="details">
                    <div class="title">India</div>
                  </div>
                  <div class="status">
                    <span>28</span>%
                  </div>
                  <div class="progress-xs not-rounded progress">
                    <div class="progress-bar progress-bar-success width-per-28" role="progressbar" aria-valuenow="28"
                      aria-valuemin="0" aria-valuemax="100">
                      <span class="sr-only">28%</span>
                    </div>
                  </div>
                </div>
                <div class="progress-list m-b-10">
                  <div class="details">
                    <div class="title">Other</div>
                  </div>
                  <div class="status">
                    <span>16</span>%
                  </div>
                  <div class="progress-xs not-rounded progress">
                    <div class="progress-bar progress-bar-hotpink width-per-16" role="progressbar" aria-valuenow="16"
                      aria-valuemin="0" aria-valuemax="100">
                      <span class="sr-only">16%</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </mat-card-content>
        </mat-card>
      </div>
    </div>
  </div>
</section>
