<section class="content">
  <div class="container-fluid">
    <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 mb-2">
      <mat-form-field class="example-full-width" appearance="outline">
        <mat-label>Country</mat-label>
        <mat-select [formControl]="countryControl">
          <mat-option value="All">All</mat-option>
          <mat-option *ngFor="let country of (_countriesTypes$ | async)" [value]="country">
            {{ country }}
          </mat-option>
        </mat-select>
      </mat-form-field>
    </div>
    <!-- Widgets -->
    <div class="row">
      <div class="col-lg-3 col-sm-6">
        <app-order-info-box
          title="Today's Sales"
          [value]="todaySales"
          [percentageText]="todayPercentage"
          iconClass="fas fa-cart-plus"
          bgClass="bg-c-blue"
        ></app-order-info-box>
      </div>
      <div class="col-lg-3 col-sm-6">
        <app-order-info-box
          title="Monthly Sales"
          [value]="monthlySales"
          [percentageText]="monthlyPercentage"
          iconClass="fas fa-business-time"
          bgClass="bg-c-green"
        ></app-order-info-box>
      </div>
      <div class="col-lg-3 col-sm-6">
        <app-order-info-box
          [title]="fiscalYearTitle"
          [value]="totalSalesFY"
          [percentageText]="totalPercentageFY"
          iconClass="fas fa-chart-line"
          bgClass="bg-c-yellow"
        ></app-order-info-box>
      </div>
      <div class="col-lg-3 col-sm-6">
        <app-order-info-box
          title="Total Sales"
          [value]="totalSalesQuantity"
          percentageText="Total sales of all years"
          iconClass="fas fa-list"
          bgClass="l-bg-card1">
        </app-order-info-box>
      </div>
    </div>
    <!-- #END# Widgets -->
    <div class="row">
      <div class="col-xs-12 col-sm-12 col-md-6 col-lg-6">
        <mat-card>
          <mat-card-header class="header-style">
            <mat-card-title>Yearly Sales</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <div id="chart">
              <apx-chart [series]="areaChartOptions.series!" [chart]="areaChartOptions.chart!"
                [xaxis]="areaChartOptions.xaxis!" [yaxis]="areaChartOptions.yaxis!" [colors]="areaChartOptions.colors!"
                [stroke]="areaChartOptions.stroke!" [legend]="areaChartOptions.legend!" [grid]="areaChartOptions.grid!"
                [tooltip]="areaChartOptions.tooltip!" [dataLabels]="areaChartOptions.dataLabels!"></apx-chart>
            </div>
            <div class="row">
              <div class="col-4">
                <p class="text-muted font-12 text-truncate">Target</p>
                <h6>
                  <i class="fas fa-arrow-circle-up col-green m-r-5"></i>2.5k
                </h6>
              </div>
              <div class="col-4">
                <p class="text-muted font-12 text-truncate">Last Year</p>
                <h6>
                  <i class="fas fa-arrow-circle-down col-red m-r-5"></i>
                  {{ lastYearSales || 0 }}
                </h6>
              </div>
              <div class="col-4">
                <p class="text-muted font-12 text-truncate">This Year</p>
                <h6>
                  <i class="fas fa-arrow-circle-up col-green m-r-5"></i>
                  {{ currentYearSales || 0 }}
                </h6>
              </div>
            </div>
          </mat-card-content>
        </mat-card>
      </div>
      <div class="col-xs-12 col-sm-12 col-md-6 col-lg-6">
        <mat-card>
          <mat-card-header class="header-style">
            <mat-card-title>Daily Sales</mat-card-title>
          </mat-card-header>
          <mat-card-content>
            <div id="chart">
              <apx-chart [series]="barChartOptions.series!" [chart]="barChartOptions.chart!"
                [legend]="barChartOptions.legend!" [dataLabels]="barChartOptions.dataLabels!"
                [colors]="barChartOptions.colors!" [plotOptions]="barChartOptions.plotOptions!"
                [tooltip]="barChartOptions.tooltip!" [grid]="barChartOptions.grid!"></apx-chart>
            </div>
            <div class="row">
              <div class="col-4">
                <p class="text-muted font-12 text-truncate">Target</p>
                <h6>
                  <i class="fas fa-arrow-circle-up col-green m-r-5"></i>50
                </h6>
              </div>
              <div class="col-4">
                <p class="text-muted font-12 text-truncate">Yesterday's Sale</p>
                <h6>
                  <i class="fas fa-arrow-circle-down col-red m-r-5"></i>
                  {{ yesterdaySales | number }}
                </h6>
              </div>
              <div class="col-4">
                <p class="text-muted font-12 text-truncate">Today's Sale</p>
                <h6>
                  <i class="fas fa-arrow-circle-up col-green m-r-5"></i>
                  {{ todaySales | number }}
                </h6>
              </div>
            </div>

          </mat-card-content>
        </mat-card>
      </div>
    </div>
    <div class="row clearfix">
      <div class="col-xs-12 col-sm-12 col-md-8 col-lg-12">
        <mat-card>
          <mat-card-header class="header-style">

          <mat-card-content>
            <div id="chart">

                [stroke]="chartOptions.stroke!" [colors]="chartOptions.colors!" [dataLabels]="chartOptions.dataLabels!"
                [legend]="chartOptions.legend!" [markers]="chartOptions.markers!" [grid]="chartOptions.grid!"
                [tooltip]="chartOptions.tooltip!" [yaxis]="chartOptions.yaxis!" [title]="chartOptions.title!">
              </apx-chart>
            </div>
          </mat-card-content>
        </mat-card>
      </div>
